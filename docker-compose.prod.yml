services:
  database:
    image: postgres:16-alpine
    container_name: bookstore-db

    environment:
      POSTGRES_DB: bookstore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"

    volumes:
      - bookstore_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bookstore"]
      interval: 5s
      timeout: 5s
      retries: 10

    restart: unless-stopped

  backend:
    image: "${ACR_LOGIN_SERVER}/bookstore-backend:${IMAGE_TAG}"
    container_name: bookstore-backend

    environment:
      DATABASE_URL: "postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@database:5432/bookstore"

    depends_on:
      database:
        condition: service_healthy

    expose:
      - "8000"

    restart: unless-stopped

  frontend:
    image: "${ACR_LOGIN_SERVER}/bookstore-frontend:${IMAGE_TAG}"
    container_name: bookstore-frontend

    depends_on:
      - backend

    ports:
      - "8080:80"

    restart: unless-stopped

volumes:
  bookstore_data:
