name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:

  # STAGE 1: VALIDATE BACKEND

  backend-lint:
    name: "Stage 1 - Validate Backend"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Check Python and pip versions
        run: |
          python --version
          python -m pip --version

      - name: Install backend dependencies and Ruff
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install ruff

      - name: Run Ruff lint check
        run: ruff check .

      - name: Check Python formatting
        run: ruff format --check .

      - name: Check Python syntax
        run: |
          python -m compileall \
            -q \
            -x '(^|/)(\.venv|venv|__pycache__|\.git|\.pytest_cache)/' \
            .


  # STAGE 1: VALIDATE FRONTEND

  frontend-lint:
    name: "Stage 1 - Validate Frontend"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Check Node.js and npm versions
        run: |
          node --version
          npm --version

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint --if-present

      - name: Check frontend dependencies
        run: npm ls --depth=0


  # STAGE 2: BACKEND UNIT TEST

  backend-unit-test:
    name: "Stage 2 - Backend Unit Test"
    runs-on: ubuntu-latest

    needs:
      - backend-lint
      - frontend-lint

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: "sqlite+pysqlite:///:memory:"

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run backend unit tests
        run: |
          pytest -v \
            tests/test_health.py \
            tests/test_api.py


  # STAGE 2: BACKEND INTEGRATION TEST

  backend-integration-test:
    name: "Stage 2 - Backend PostgreSQL Integration Test"
    runs-on: ubuntu-latest

    needs:
      - backend-lint
      - frontend-lint

    services:
      postgres:
        image: postgres:16-alpine

        env:
          POSTGRES_DB: bookstore_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres123

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U postgres -d bookstore_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: "postgresql+psycopg://postgres:postgres123@localhost:5432/bookstore_test"

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Check PostgreSQL client
        run: psql --version

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run PostgreSQL integration tests
        run: pytest -v tests/test_database_integration.py


  # STAGE 3: BUILD FRONTEND 

  frontend-build:
    name: "Stage 3 - Build Frontend Artifact"
    runs-on: ubuntu-latest

    needs:
      - frontend-lint

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Verify frontend build
        run: |
          test -f dist/index.html
          test -d dist/assets
          ls -la dist
          ls -la dist/assets

      # Chỉ lưu artifact production khi push hoặc merge vào main.
      - name: Upload frontend artifact
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error
          retention-days: 7


  # STAGE 3: BUILD AND PUSH BACKEND IMAGE 

  backend-image:
    name: "Stage 3 - Build and Push Backend Image"
    runs-on: ubuntu-latest

    needs:
      - backend-unit-test
      - backend-integration-test

    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Check Docker version
        run: docker --version

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build backend image
        run: |
          docker build \
            --tag "${{ secrets.ACR_LOGIN_SERVER }}/bookstore-backend:${{ github.sha }}" \
            --tag "${{ secrets.ACR_LOGIN_SERVER }}/bookstore-backend:latest" \
            ./backend

      - name: Verify backend image
        run: |
          docker image inspect \
            "${{ secrets.ACR_LOGIN_SERVER }}/bookstore-backend:${{ github.sha }}"

      - name: Push backend image
        run: |
          docker push \
            "${{ secrets.ACR_LOGIN_SERVER }}/bookstore-backend:${{ github.sha }}"

          docker push \
            "${{ secrets.ACR_LOGIN_SERVER }}/bookstore-backend:latest"