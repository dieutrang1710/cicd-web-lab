name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend-unit-test:
    name: Backend Unit Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: "sqlite+pysqlite:///:memory:"

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Check Python and pip versions
        run: |
          python --version
          python -m pip --version

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run backend unit tests
        run: |
          pytest -v \
            tests/test_health.py \
            tests/test_api.py

  backend-lint:
    name: Backend Lint and Code Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Check Python and pip versions
        run: |
          python --version
          python -m pip --version

      - name: Install backend dependencies and Ruff
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install ruff

      - name: Run Ruff lint check
        run: ruff check .

      - name: Check Python formatting
        run: ruff format --check .

      - name: Check Python syntax
        run: |
          python -m compileall \
            -q \
            -x '(^|/)(\.venv|venv|__pycache__|\.git|\.pytest_cache)/' \
            .

  backend-integration-test:
    name: Backend PostgreSQL Integration Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine

        env:
          POSTGRES_DB: bookstore_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres123

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U postgres -d bookstore_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: "postgresql+psycopg://postgres:postgres123@localhost:5432/bookstore_test"

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Check runtime versions
        run: |
          python --version
          python -m pip --version
          psql --version

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run PostgreSQL integration tests
        run: pytest -v tests/test_database_integration.py

  frontend-lint:
    name: Frontend Lint and Code Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Check Node.js and npm versions
        run: |
          node --version
          npm --version

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint --if-present

      - name: Check frontend dependencies
        run: npm ls --depth=0

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Check Node.js and npm versions
        run: |
          node --version
          npm --version

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest

    needs:
      - backend-unit-test
      - backend-lint
      - backend-integration-test
      - frontend-lint
      - frontend-build

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Check Docker versions
        run: |
          docker --version
          docker compose version

      - name: Build backend Docker image
        run: |
          docker build \
            --tag "bookstore-backend:${{ github.sha }}" \
            ./backend

      - name: Build frontend Docker image
        run: |
          docker build \
            --tag "bookstore-frontend:${{ github.sha }}" \
            ./frontend

      - name: Verify backend Docker image
        run: docker image inspect "bookstore-backend:${{ github.sha }}"

      - name: Verify frontend Docker image
        run: docker image inspect "bookstore-frontend:${{ github.sha }}"

      - name: List Docker images
        run: docker image ls